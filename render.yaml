services:
  - type: web
    name: compiq-extractor
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2 --worker-class gthread --threads 4
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
